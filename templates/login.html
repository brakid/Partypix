{% extends "base.html" %}

{% block title %}Login - {{ app_title }}{% endblock %}

{% block header %}{% endblock %}

{% block content %}
<div class="login-page">
    <div class="card login-card">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">{{ app_title }}</h2>
        
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login">
            <input type="hidden" name="redirect" value="{{ redirect | default('/gallery') }}">
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autofocus>
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Enter</button>
        </form>
    </div>
</div>
{% endblock %}
